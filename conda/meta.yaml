{% set name = "FrictionSim2D" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}-meta
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python

outputs:
  # -----------------------------------------------------------------------
  # Base package: conda install frictionsim2d
  # -----------------------------------------------------------------------
  - name: {{ name|lower }}
    build:
      script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
      entry_points:
        - FrictionSim2D = src.cli:main
    requirements:
      host:
        - python >=3.9
        - pip
        - hatchling
      run:
        - python >=3.9
        # --- Scientific Binaries ---
        - atomsk
        - lammps
        # --- Python Dependencies ---
        - numpy >=1.21
        - ase >=3.22
        - pyyaml >=6.0
        - jinja2 >=3.1
        - pydantic >=2.0
        - click >=8.0
        - pandas >=1.5
    test:
      imports:
        - src
      commands:
        - FrictionSim2D --help
        - atomsk --version
        - lmp -h

  # -----------------------------------------------------------------------
  # AiiDA variant: conda install frictionsim2d-aiida
  # Installs the base package + aiida-core + rabbitmq + postgresql
  # -----------------------------------------------------------------------
  - name: {{ name|lower }}-aiida
    requirements:
      run:
        - {{ pin_subpackage(name|lower, exact=True) }}
        - aiida-core >=2.0
        - aiida-core.services >=2.0   # bundles rabbitmq-server + postgresql
        - typing_extensions >=4.0
        - psycopg2 >=2.9
    test:
      imports:
        - src
        - aiida
      commands:
        - FrictionSim2D --help
        - verdi --version
        - rabbitmqctl help  # confirm rabbitmq binary is available

about:
  home: https://github.com/Mclat16/FrictionSim2D
  summary: 'Automated generation of LAMMPS scripts for 2D material friction studies.'
  license: MIT
  license_file: LICENSE